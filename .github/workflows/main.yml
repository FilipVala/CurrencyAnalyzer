name: .NET CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feature/integrating-api

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore CurrencyAnalyzer.sln

      - name: Build
        run: dotnet build CurrencyAnalyzer.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: >
          dotnet test CurrencyAnalyzer.Tests/CurrencyAnalyzer.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
          -reports:"./TestResults/**/coverage.cobertura.xml" \
          -targetdir:"coveragereport" \
          -reporttypes:"MarkdownSummary;Html"

      - name: Upload coverage summary
        if: always()
        run: |
          cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

      - name: Check branch coverage threshold
        shell: pwsh
        run: |
          $summary = Get-Content "coveragereport/Summary.md" -Raw

          if ($summary -match 'Branch coverage: (\d+\.?\d*)%') {
              $percent = [double]$matches[1]

              Write-Host "Current Branch Coverage: $percent%"

              if ($percent -lt 80) {
                  Write-Error "Branch coverage is below 80%!"
                  exit 1
              }
          }

      - name: Publish application
        if: github.ref == 'refs/heads/main' && success()
        run: dotnet publish CurrencyAnalyzer/CurrencyAnalyzer.csproj -c Release -o publish

      - name: Upload published app
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: publish