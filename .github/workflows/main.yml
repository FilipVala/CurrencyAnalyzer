name: .NET CI + Deploy

on:
  push:
    branches:
      - main
      - develop
      - feature/integrating-api

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore CurrencyAnalyzer.sln

      - name: Build
        run: dotnet build CurrencyAnalyzer.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test CurrencyAnalyzer.sln \
          --configuration Release \
          --no-build \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
          -reports:"./TestResults/**/coverage.cobertura.xml" \
          -targetdir:"coveragereport" \
          -reporttypes:"MarkdownSummary"

      - name: Upload coverage summary
        run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build-and-test

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CurrencyAnalyzer.sln

      - name: Publish app
        run: dotnet publish CurrencyAnalyzer/CurrencyAnalyzer.csproj -c Release -o publish

      - name: Deploy to MonsterASP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/