name: Deploy Blazor App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CurrencyAnalyzer.sln

      - name: Build
        run: dotnet build CurrencyAnalyzer.sln --configuration Release --no-restore

      - name: Publish app
        run: dotnet publish CurrencyAnalyzer/CurrencyAnalyzer.csproj -c Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: publish
